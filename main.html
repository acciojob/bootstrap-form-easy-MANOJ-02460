<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<div>
		<h1>Internship Form</h1>

		<form>
			
			<label for='first-name-input'>First Name</label>
			<input type="text" id="first-name-input" required/>
			
			<label for='last-name-input'>Last Name</label>
			<input type='text' id='last-name-input' required/>

			<label for='email-input'>Email Address</label>
			<input type='email' id='email-input' required/>

			<label for='college-input'>College Name</label>
			<input type='text' id='college-input' required/>

			<label>Graduation year</label>
			<select aria-required id='grad-year-select'>
					<option>Choose</option>
					<option>2020</option>
					<option>2021</option>
					<option>2022</option>
					<option>2023</option>
			</select>

			<label for='roll-no-input'>Roll No</label>
			<input type='number' id='roll-no-input' required/>

			<br><br>
			<input type="checkbox" id="conditions-checkbox" required/>
			<label>Agree to terms and conditions</label>

			<br>
			<button type='submit'>Submit</button>
		</form>
	</div>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
